# =============================================================================
# Job Definition Template
# =============================================================================
# Copy the YAML below (starting at "resources:") and paste it into
# databricks.yml, replacing the existing empty "resources:" key.
#
# ALSO add the per-target dashboard override to the existing "targets:"
# section so the dev job refreshes a dev dashboard (querying lakeflow_lab_dev):
#
#   targets:
#     dev:
#       ...
#       resources:                              # <- add this block
#         dashboards:
#           sales_dashboard:
#             file_path: ./dashboards/sales_dashboard_dev.lvdash.json
#
# This defines two resource types and a five-task Lakeflow Job:
#
#   Resources:
#     - Dashboard (AI/BI Lakeview dashboard -- sales visualizations)
#     - Job       (Lakeflow Job -- orchestrates everything)
#
#   Job task DAG (fan-out / fan-in):
#
#     run_bronze         (notebook task)
#          |
#          v
#     run_silver         (notebook task)
#        /    \
#       v      v
#     run_gold_sales   run_gold_products
#     (notebook task)  (notebook task)
#        \    /
#         v  v
#     refresh_dashboard  (dashboard task)
#
# Job-level parameters (catalog, schema) are pushed down automatically
# to notebook tasks -- no per-task configuration needed.
# catalog and schema use ${var.*} so the correct environment schema is
# selected automatically based on the target (dev or prod).
# =============================================================================

resources:

  # ---------------------------------------------------------------------------
  # Dashboard -- AI/BI Lakeview Dashboard
  #
  # Visualizes the gold-layer tables produced by the ETL notebooks.
  # The dashboard definition lives in dashboards/sales_dashboard.lvdash.json.
  # The dev target overrides file_path to sales_dashboard_dev.lvdash.json
  # so the dev dashboard queries lakeflow_lab_dev tables.
  # ---------------------------------------------------------------------------
  dashboards:
    sales_dashboard:
      display_name: "Lakeflow Lab - Sales Dashboard [${bundle.target}]"
      file_path: ${var.dashboard_file_path}
      warehouse_id: ${var.warehouse_id}

  # ---------------------------------------------------------------------------
  # Job -- Lakeflow Orchestration Job
  #
  # Five tasks, two task types:
  #   1. Notebook task   -- run_bronze (raw CSV ingestion)
  #   2. Notebook task   -- run_silver (cleanse & transform)
  #   3. Notebook task   -- run_gold_sales (regional aggregations)
  #   4. Notebook task   -- run_gold_products (product aggregations)
  #   5. Dashboard task  -- refresh_dashboard (update visualizations)
  # ---------------------------------------------------------------------------
  jobs:
    lakeflow_lab_job:
      name: "Lakeflow Lab - Orchestration Job [${bundle.target}]"

      # -----------------------------------------------------------------------
      # Job-level parameters
      #
      # Pushed down automatically to notebook tasks at run time.
      # Override at run time in the UI ("Run now with different parameters")
      # or via the CLI:
      #   databricks bundle run lakeflow_lab_job --target dev \
      #     -p catalog=workspace -p schema=lakeflow_lab_dev
      # -----------------------------------------------------------------------
      parameters:
        - name: catalog
          default: ${var.catalog}   # resolved at deploy time
        - name: schema
          default: ${var.schema}    # lakeflow_lab_dev (dev) or lakeflow_lab (prod)

      # -----------------------------------------------------------------------
      # Schedule -- runs daily at 6 AM UTC
      # -----------------------------------------------------------------------
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"

      # -----------------------------------------------------------------------
      # Notifications -- email on failure
      # -----------------------------------------------------------------------
      email_notifications:
        on_failure:
          - your-email@example.com

      tasks:

        # -----------------------------------------------------------------------
        # Task 1 -- Run Bronze (Notebook task)
        #
        # No depends_on -- this task starts immediately when the job runs.
        # Ingests raw CSV from the source volume into bronze_orders.
        # -----------------------------------------------------------------------
        - task_key: run_bronze
          notebook_task:
            notebook_path: ./pipeline/bronze_notebook.py
            source: WORKSPACE

        # -----------------------------------------------------------------------
        # Task 2 -- Run Silver (Notebook task)
        #
        # depends_on: run_bronze
        # Cleanses, type-casts, deduplicates, and filters into silver_orders.
        # -----------------------------------------------------------------------
        - task_key: run_silver
          depends_on:
            - task_key: run_bronze
          notebook_task:
            notebook_path: ./pipeline/silver_notebook.py
            source: WORKSPACE

        # -----------------------------------------------------------------------
        # Task 3 -- Run Gold Sales (Notebook task)
        #
        # depends_on: run_silver
        # Aggregates completed orders by region and month.
        # Runs in PARALLEL with run_gold_products (fan-out).
        # -----------------------------------------------------------------------
        - task_key: run_gold_sales
          depends_on:
            - task_key: run_silver
          notebook_task:
            notebook_path: ./pipeline/gold_sales_notebook.py
            source: WORKSPACE

        # -----------------------------------------------------------------------
        # Task 4 -- Run Gold Products (Notebook task)
        #
        # depends_on: run_silver
        # Aggregates completed orders by product and category.
        # Runs in PARALLEL with run_gold_sales (fan-out).
        # -----------------------------------------------------------------------
        - task_key: run_gold_products
          depends_on:
            - task_key: run_silver
          notebook_task:
            notebook_path: ./pipeline/gold_products_notebook.py
            source: WORKSPACE

        # -----------------------------------------------------------------------
        # Task 5 -- Refresh the sales dashboard (Dashboard task)
        #
        # depends_on: run_gold_sales, run_gold_products (fan-in)
        # Refreshes the AI/BI dashboard so it reflects the latest data.
        # -----------------------------------------------------------------------
        - task_key: refresh_dashboard
          depends_on:
            - task_key: run_gold_sales
            - task_key: run_gold_products
          dashboard_task:
            dashboard_id: ${resources.dashboards.sales_dashboard.id}
