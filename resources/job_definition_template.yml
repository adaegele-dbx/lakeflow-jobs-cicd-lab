# =============================================================================
# Job Definition Template
# =============================================================================
# Copy the YAML below (starting at "resources:") and paste it into
# databricks.yml, replacing the existing empty "resources:" key.
#
# This defines three resource types and a three-task Lakeflow Job:
#
#   Resources:
#     - Pipeline  (Lakeflow Declarative Pipeline — medallion ETL)
#     - Dashboard (AI/BI Lakeview dashboard — sales visualizations)
#     - Job       (Lakeflow Job — orchestrates everything)
#
#   Job task DAG:
#
#     validate_source  (notebook task)
#          │
#          ▼
#     run_pipeline     (pipeline task)
#          │
#          ▼
#     refresh_dashboard (dashboard task)
#
# Job-level parameters (run_date, catalog, schema) are pushed down
# automatically to notebook tasks — no per-task configuration needed.
# The pipeline gets catalog/schema from its own configuration.
# catalog and schema use ${var.*} so the correct environment schema is
# selected automatically based on the target (dev or prod).
# =============================================================================

resources:

  # ─────────────────────────────────────────────────────────────────────────
  # Pipeline — Lakeflow Declarative Pipeline (Delta Live Tables)
  #
  # Processes the entire medallion architecture in a single pipeline:
  #   bronze_orders → silver_orders → gold_sales_by_region, gold_top_products
  #
  # The catalog and target (schema) are set here, not in the pipeline code.
  # The pipeline.volume_path configuration tells the pipeline where to
  # find the source CSV data.
  # ─────────────────────────────────────────────────────────────────────────
  pipelines:
    medallion_pipeline:
      name: "Lakeflow Lab - Medallion Pipeline [${bundle.target}]"
      catalog: ${var.catalog}
      target: ${var.schema}
      configuration:
        pipeline.volume_path: /Volumes/${var.catalog}/${var.schema}/raw_data
      libraries:
        - file:
            path: ./pipeline/medallion_pipeline.py

  # ─────────────────────────────────────────────────────────────────────────
  # Dashboard — AI/BI Lakeview Dashboard
  #
  # Visualizes the gold-layer tables produced by the pipeline.
  # The dashboard definition lives in dashboards/sales_dashboard.lvdash.json.
  # ─────────────────────────────────────────────────────────────────────────
  dashboards:
    sales_dashboard:
      display_name: "Lakeflow Lab - Sales Dashboard [${bundle.target}]"
      file_path: ./dashboards/sales_dashboard.lvdash.json

  # ─────────────────────────────────────────────────────────────────────────
  # Job — Lakeflow Orchestration Job
  #
  # Three tasks, three different task types:
  #   1. Notebook task  — validate_source (pre-flight gate)
  #   2. Pipeline task  — run_pipeline (medallion ETL)
  #   3. Dashboard task — refresh_dashboard (update visualizations)
  # ─────────────────────────────────────────────────────────────────────────
  jobs:
    lakeflow_lab_job:
      name: "Lakeflow Lab - Orchestration Job [${bundle.target}]"

      # -----------------------------------------------------------------------
      # Job-level parameters
      #
      # Pushed down automatically to notebook tasks at run time.
      # Override at run time in the UI ("Run now with different parameters")
      # or via the CLI:
      #   databricks bundle run lakeflow_lab_job --target dev \
      #     -p run_date=2024-02-15
      # -----------------------------------------------------------------------
      parameters:
        - name: run_date
          default: "2024-03-31"
        - name: catalog
          default: ${var.catalog}   # resolved at deploy time
        - name: schema
          default: ${var.schema}    # lakeflow_lab_dev (dev) or lakeflow_lab (prod)

      # -----------------------------------------------------------------------
      # Schedule — runs daily at 6 AM UTC
      # -----------------------------------------------------------------------
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"

      # -----------------------------------------------------------------------
      # Notifications — email on failure
      # -----------------------------------------------------------------------
      email_notifications:
        on_failure:
          - your-email@example.com

      tasks:

        # -----------------------------------------------------------------------
        # Task 1 — Validate source data (Notebook task)
        #
        # No depends_on — this task starts immediately when the job runs.
        # If it fails, all downstream tasks are automatically skipped.
        # -----------------------------------------------------------------------
        - task_key: validate_source
          notebook_task:
            notebook_path: ./validation/source_validation_notebook
            source: WORKSPACE

        # -----------------------------------------------------------------------
        # Task 2 — Run the medallion pipeline (Pipeline task)
        #
        # depends_on: validate_source
        # Triggers the Lakeflow Declarative Pipeline which processes
        # bronze → silver → gold in a single managed execution.
        # -----------------------------------------------------------------------
        - task_key: run_pipeline
          depends_on:
            - task_key: validate_source
          pipeline_task:
            pipeline_id: ${resources.pipelines.medallion_pipeline.id}

        # -----------------------------------------------------------------------
        # Task 3 — Refresh the sales dashboard (Dashboard task)
        #
        # depends_on: run_pipeline
        # Refreshes the AI/BI dashboard so it reflects the latest data
        # written by the pipeline.
        # -----------------------------------------------------------------------
        - task_key: refresh_dashboard
          depends_on:
            - task_key: run_pipeline
          dashboard_task:
            dashboard_id: ${resources.dashboards.sales_dashboard.id}
