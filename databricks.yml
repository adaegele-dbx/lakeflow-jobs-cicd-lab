bundle:
  name: lakeflow-jobs-ci-cd-lab

variables:
  catalog:
    default: workspace
    description: The Unity Catalog catalog to deploy resources into
  schema:
    default: lakeflow_lab
    description: The schema (database) to use for lab tables
  warehouse_id:
    default: <TO DO: find the warehouse ID in the UI>
    description: The SQL warehouse ID for the dashboard task (find under SQL Warehouses in the UI)
  dashboard_file_path:
    default: ./dashboards/sales_dashboard.lvdash.json
    description: The path to the dashboard definition file

targets:
  dev:
    mode: development
    default: true
    variables:
      schema: lakeflow_lab_dev   # dev writes to its own isolated schema
      dashboard_file_path: ./dashboards/sales_dashboard_dev.lvdash.json

  prod:
    variables:
      schema: lakeflow_lab       # prod writes to the canonical schema

# =============================================================================
# RESOURCES — Complete this section during Part 5 of the lab!
#
# You will define two resources here:
#   An AI/BI Lakeview Dashboard       (resources.dashboards)
#   A Lakeflow Orchestration Job      (resources.jobs)
#
# You will also add a per-target override under the dev target above
# so that dev deploys use sales_dashboard_dev.lvdash.json (which queries
# the lakeflow_lab_dev schema).
#
# See resources/job_definition_template.yml for the complete YAML to paste in,
# or follow the step-by-step instructions in lab_notebook.py (Part 5).
# =============================================================================
resources:
