bundle:
  name: lakeflow-jobs-ci-cd-lab

variables:
  catalog:
    default: workspace
    description: The Unity Catalog catalog to deploy resources into
  schema:
    default: lakeflow_lab
    description: The schema (database) to use for pipeline targets and lab tables

targets:
  dev:
    mode: development
    default: true
    variables:
      schema: lakeflow_lab_dev   # dev writes to its own isolated schema

  prod:
    variables:
      schema: lakeflow_lab       # prod writes to the canonical schema

